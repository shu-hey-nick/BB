<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BB">
<meta name="theme-color" content="#000000">
<title>BB 家計簿</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: #000; color: #fff; font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; min-height: 100vh; overscroll-behavior: none; }
  input { font-family: inherit; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  #app { max-width: 430px; margin: 0 auto; min-height: 100vh; padding-bottom: 90px; }
  .header { position: sticky; top: 0; z-index: 10; background: rgba(0,0,0,.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid #1c1c1e; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-box { width: 34px; height: 34px; background: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-text { font-size: 13px; font-weight: 900; color: #000; letter-spacing: -1px; }
  .logo-label { font-size: 11px; color: #555; font-weight: 700; letter-spacing: 2px; }
  .month-nav { display: flex; align-items: center; gap: 10px; }
  .month-nav button { background: #1c1c1e; border: none; color: #fff; width: 32px; height: 32px; border-radius: 8px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .month-nav button:disabled { background: #111; color: #333; cursor: default; }
  .month-label { font-size: 14px; font-weight: 700; min-width: 80px; text-align: center; }
  nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: rgba(0,0,0,.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid #1c1c1e; display: flex; padding: 8px 0 28px; z-index: 10; }
  nav button { flex: 1; background: none; border: none; color: #555; font-size: 9px; cursor: pointer; padding: 4px 0; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color .15s; font-family: inherit; }
  nav button.active { color: #fff; font-weight: 700; }
  nav button span.icon { font-size: 20px; line-height: 1; }
  .page { padding: 18px 16px 0; display: none; }
  .page.active { display: block; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .card { background: #1c1c1e; border-radius: 16px; padding: 16px 16px 14px; }
  .card-label { font-size: 11px; color: #888; margin-bottom: 4px; font-weight: 500; }
  .card-value { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .card-note { font-size: 10px; color: #888; margin-top: 3px; }
  .goal-bar-wrap { height: 5px; background: #2c2c2e; border-radius: 3px; overflow: hidden; margin: 8px 0 4px; }
  .goal-bar { height: 100%; border-radius: 3px; transition: width .4s; }
  .goal-rate { font-size: 11px; color: #aaa; }
  .goal-change-btn { margin-top: 8px; background: #2c2c2e; border: none; color: #888; border-radius: 6px; padding: 3px 10px; font-size: 11px; cursor: pointer; font-family: inherit; }
  .section-label { font-size: 11px; color: #888; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 8px; }
  .row { background: #1c1c1e; border-radius: 12px; padding: 13px 14px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
  .row.fixed { border-left: 3px solid #f97316; }
  .row-name { font-size: 13px; color: #aaa; margin-bottom: 2px; }
  .row-amount { font-size: 20px; font-weight: 700; }
  .row-actions { display: flex; gap: 8px; align-items: center; }
  .btn-edit { background: #2c2c2e; border: none; color: #aaa; border-radius: 8px; padding: 7px 12px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-del { background: none; border: none; color: #f87171; font-size: 18px; cursor: pointer; }
  .badge-fixed { background: #f97316; color: #000; font-size: 9px; font-weight: 800; border-radius: 4px; padding: 2px 6px; margin-left: 6px; }
  .row-memo { font-size: 11px; color: #888; }
  .empty-msg { color: #555; text-align: center; padding: 50px 0; font-size: 14px; }
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .page-total-label { font-size: 11px; color: #888; margin-bottom: 2px; }
  .page-total-val { font-size: 26px; font-weight: 800; }
  .page-total-sub { font-size: 11px; color: #888; margin-top: 2px; }
  .btn-add { border: none; color: #000; border-radius: 12px; padding: 10px 16px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .graph-card { background: #1c1c1e; border-radius: 16px; padding: 16px; margin-bottom: 10px; }
  .graph-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .graph-title { font-size: 13px; color: #aaa; font-weight: 600; }
  .graph-dots { display: flex; gap: 5px; }
  .graph-dot { height: 6px; border-radius: 3px; background: #333; cursor: pointer; transition: width .2s; }
  .graph-dot.active { background: #fff; }
  .bar-wrap { display: flex; align-items: flex-end; gap: 5px; height: 110px; padding-bottom: 4px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .bar-val { font-size: 9px; color: #aaa; }
  .bar { width: 100%; border-radius: 3px 3px 0 0; transition: height .3s; }
  .bar-labels { display: flex; gap: 5px; }
  .bar-label { flex: 1; text-align: center; font-size: 9px; color: #555; }
  .pie-legend { display: flex; justify-content: center; gap: 24px; margin-top: 4px; }
  .pie-item { text-align: center; }
  .pie-item-label { font-size: 10px; margin-bottom: 2px; }
  .pie-item-val { font-size: 15px; font-weight: 700; }
  /* Calendar */
  .cal-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .cal-chip { background: #1c1c1e; border-radius: 12px; padding: 12px 14px; }
  .cal-chip-label { font-size: 10px; color: #888; margin-bottom: 3px; }
  .cal-chip-val { font-size: 18px; font-weight: 700; }
  .cal-card { background: #1c1c1e; border-radius: 16px; padding: 14px; margin-bottom: 16px; }
  .cal-dow { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 8px; }
  .cal-dow-cell { text-align: center; font-size: 10px; font-weight: 600; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px 0; }
  .cal-cell { min-height: 58px; padding: 4px 2px; text-align: center; cursor: pointer; border-radius: 10px; -webkit-user-select: none; user-select: none; }
  .cal-cell.today { background: #2c2c2e; }
  .cal-day { font-size: 13px; line-height: 1.4; }
  .cal-dots { display: flex; justify-content: center; gap: 2px; margin: 2px 0 1px; }
  .cal-dot-i { width: 4px; height: 4px; background: #34d399; border-radius: 50%; }
  .cal-dot-e { width: 4px; height: 4px; background: #f97316; border-radius: 50%; }
  .cal-amt { font-size: 8px; line-height: 1.3; }
  .cal-list-card { background: #1c1c1e; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
  .cal-list-date { font-size: 12px; font-weight: 700; color: #aaa; margin-bottom: 8px; }
  .cal-list-row { display: flex; justify-content: space-between; align-items: center; padding-bottom: 8px; }
  .cal-list-actions { display: flex; align-items: center; gap: 8px; }
  .type-badge { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }
  .btn-edit-sm { background: #2c2c2e; border: none; color: #aaa; border-radius: 7px; padding: 5px 10px; font-size: 12px; cursor: pointer; font-family: inherit; }
  .btn-del-sm { background: none; border: none; color: #f87171; font-size: 16px; cursor: pointer; }
  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.78); z-index: 100; display: flex; align-items: flex-end; }
  .modal-box { background: #1c1c1e; border-radius: 22px 22px 0 0; width: 100%; max-height: 88vh; overflow-y: auto; padding: 24px 20px 52px; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  .modal-title { font-size: 18px; color: #fff; font-weight: 700; }
  .modal-close { background: #2c2c2e; border: none; color: #aaa; width: 30px; height: 30px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; font-weight: 500; }
  .field input { width: 100%; background: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 12px; color: #fff; font-size: 16px; padding: 13px 14px; outline: none; -webkit-appearance: none; appearance: none; font-family: inherit; }
  .toggle-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; cursor: pointer; }
  .toggle-track { width: 50px; height: 28px; border-radius: 14px; background: #3a3a3c; position: relative; transition: background .2s; flex-shrink: 0; }
  .toggle-track.on { background: #f97316; }
  .toggle-thumb { position: absolute; width: 22px; height: 22px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: left .2s; box-shadow: 0 1px 4px rgba(0,0,0,.4); }
  .toggle-track.on .toggle-thumb { left: 25px; }
  .toggle-label { font-size: 14px; color: #ddd; }
  .btn-primary { width: 100%; border: none; color: #000; border-radius: 14px; padding: 15px; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 4px; font-family: inherit; }
  .type-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .type-btn { background: #2c2c2e; border: 2px solid transparent; color: #aaa; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s; }
  .type-btn.sel-inc { background: rgba(96,165,250,.15); border-color: #60a5fa; color: #60a5fa; }
  .type-btn.sel-exp { background: rgba(249,115,22,.15); border-color: #f97316; color: #f97316; }
  .day-item { background: #2c2c2e; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.82); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .confirm-box { background: #1c1c1e; border-radius: 18px; padding: 24px; width: 100%; max-width: 320px; }
  .confirm-msg { color: #fff; font-size: 16px; margin-bottom: 22px; text-align: center; }
  .confirm-btns { display: flex; gap: 10px; }
  .confirm-btns button { flex: 1; border: none; border-radius: 12px; padding: 14px; font-size: 15px; cursor: pointer; font-family: inherit; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">
      <div class="logo-box"><span class="logo-text">BB</span></div>
      <span class="logo-label">KAKEIBO</span>
    </div>
    <div class="month-nav">
      <button id="btn-prev">‹</button>
      <span class="month-label" id="month-label"></span>
      <button id="btn-next">›</button>
    </div>
  </div>

  <div class="page active" id="page-home">
    <div class="grid2">
      <div class="card"><div class="card-label">収入合計</div><div class="card-value" id="h-inc" style="color:#60a5fa"></div><div class="card-note" id="h-cal-inc"></div></div>
      <div class="card"><div class="card-label">支出合計</div><div class="card-value" id="h-exp" style="color:#f97316"></div><div class="card-note" id="h-cal-exp"></div></div>
    </div>
    <div class="grid2">
      <div class="card"><div class="card-label">残高 / 貯金</div><div class="card-value" id="h-bal"></div></div>
      <div class="card">
        <div class="card-label">貯金目標</div>
        <div class="card-value" id="h-goal" style="color:#34d399;font-size:20px"></div>
        <div class="goal-bar-wrap"><div class="goal-bar" id="goal-bar"></div></div>
        <div class="goal-rate" id="goal-rate"></div>
        <button class="goal-change-btn" id="btn-goal-change">変更</button>
      </div>
    </div>
    <div class="graph-card">
      <div class="graph-header"><span class="graph-title" id="graph-title"></span><div class="graph-dots" id="graph-dots"></div></div>
      <div id="graph-body" style="touch-action:pan-y"></div>
    </div>
  </div>

  <div class="page" id="page-income">
    <div class="page-header">
      <div><div class="page-total-label">収入合計</div><div class="page-total-val" id="inc-total" style="color:#60a5fa"></div><div class="page-total-sub" id="inc-sub"></div></div>
      <button class="btn-add" style="background:#60a5fa" id="btn-add-income">＋ 追加</button>
    </div>
    <div id="income-list"></div>
  </div>

  <div class="page" id="page-expense">
    <div class="page-header">
      <div><div class="page-total-label">支出合計</div><div class="page-total-val" id="exp-total" style="color:#f97316"></div><div class="page-total-sub" id="exp-sub"></div></div>
      <button class="btn-add" style="background:#f97316" id="btn-add-expense">＋ 追加</button>
    </div>
    <div id="expense-list"></div>
  </div>

  <div class="page" id="page-calendar">
    <div class="cal-summary">
      <div class="cal-chip"><div class="cal-chip-label">カレンダー収入</div><div class="cal-chip-val" id="cal-inc-t" style="color:#34d399"></div></div>
      <div class="cal-chip"><div class="cal-chip-label">カレンダー支出</div><div class="cal-chip-val" id="cal-exp-t" style="color:#f97316"></div></div>
    </div>
    <div id="cal-grid-wrap"></div>
    <div id="cal-list"></div>
  </div>

  <nav>
    <button class="active" data-tab="home"><span class="icon">⊞</span>ホーム</button>
    <button data-tab="income"><span class="icon">↑</span>収入</button>
    <button data-tab="expense"><span class="icon">↓</span>支出</button>
    <button data-tab="calendar"><span class="icon">▦</span>カレンダー</button>
  </nav>
</div>

<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-header"><span class="modal-title" id="modal-title"></span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div id="modal-body"></div>
  </div>
</div>

<div class="confirm-overlay" id="confirm" style="display:none">
  <div class="confirm-box">
    <div class="confirm-msg">この項目を削除しますか？</div>
    <div class="confirm-btns">
      <button style="background:#2c2c2e;color:#fff" onclick="closeConfirm()">キャンセル</button>
      <button style="background:#f87171;color:#fff;font-weight:700" id="confirm-ok">削除</button>
    </div>
  </div>
</div>

<script>
const SK='bb_kakeibo_v4';
function loadAll(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch{return{};}}
function saveAll(d){try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){console.error(e);}}

function mk(y,m){return`${y}-${String(m).padStart(2,'0')}`;}
function addM(y,m,d){const dt=new Date(y,m-1+d,1);return{y:dt.getFullYear(),m:dt.getMonth()+1};}
function daysIn(y,m){return new Date(y,m,0).getDate();}
function fmtM(y,m){return`${y}年${m}月`;}
function fmt(n){if(n===''||n==null)return'';const v=Number(n);if(isNaN(v))return'';return v.toLocaleString('ja-JP');}
function uid(){return Math.random().toString(36).slice(2,9);}
function today(){const d=new Date();return{y:d.getFullYear(),m:d.getMonth()+1,d:d.getDate()};}

// 万表記（カレンダーマス用）
function fmtMan(n){
  const v=Number(n);if(!v)return'';
  if(Math.abs(v)>=10000){
    const man=v/10000;
    return(Number.isInteger(man)?man:Math.round(man*10)/10)+'万';
  }
  return fmt(v);
}

let allData=loadAll();
let cur={y:today().y,m:today().m};

function emptyMonth(){return{incomes:[],expenses:[],calItems:{},savingGoal:30000};}
function getMonth(key){
  if(allData[key])return allData[key];
  const prev=addM(cur.y,cur.m,-1);
  const pm=allData[mk(prev.y,prev.m)];
  const base=emptyMonth();
  if(pm){
    base.incomes=(pm.incomes||[]).map(i=>({...i,amount:''}));
    base.expenses=(pm.expenses||[]).filter(e=>e.fixed).map(e=>({...e}));
    base.savingGoal=pm.savingGoal||30000;
  }
  return base;
}
function saveMonth(md){allData[mk(cur.y,cur.m)]=md;saveAll(allData);}
function curMonth(){return getMonth(mk(cur.y,cur.m));}

function totals(md){
  const regInc=(md.incomes||[]).reduce((s,i)=>s+(Number(i.amount)||0),0);
  const allCal=Object.values(md.calItems||{}).flat();
  const calInc=allCal.filter(x=>x.type==='inc').reduce((s,t)=>s+(Number(t.amount)||0),0);
  const inc=regInc+calInc;
  const regExp=(md.expenses||[]).reduce((s,e)=>s+(Number(e.amount)||0),0);
  const calExp=allCal.filter(x=>x.type==='exp').reduce((s,t)=>s+(Number(t.amount)||0),0);
  const exp=regExp+calExp;
  const balance=inc-exp;
  const goal=Number(md.savingGoal)||0;
  const rate=goal>0?Math.round(balance/goal*1000)/10:null;
  return{regInc,calInc,inc,regExp,calExp,exp,balance,goal,rate};
}

let graphIdx=0,graphTouchX=null,pendingDelete=null,calItemType='inc';

function render(){
  const td=today();
  const maxF=addM(td.y,td.m,12);
  document.getElementById('month-label').textContent=fmtM(cur.y,cur.m);
  document.getElementById('btn-next').disabled=(cur.y===maxF.y&&cur.m===maxF.m);
  const md=curMonth();
  const{calInc,inc,calExp,exp,balance,goal,rate}=totals(md);

  // Home
  document.getElementById('h-inc').textContent='¥'+fmt(inc);
  document.getElementById('h-exp').textContent='¥'+fmt(exp);
  document.getElementById('h-cal-inc').textContent=calInc>0?'うちカレンダー ¥'+fmt(calInc):'';
  document.getElementById('h-cal-exp').textContent=calExp>0?'うちカレンダー ¥'+fmt(calExp):'';
  const bel=document.getElementById('h-bal');
  bel.textContent='¥'+fmt(balance);bel.style.color=balance>=0?'#34d399':'#f87171';
  document.getElementById('h-goal').textContent='¥'+fmt(goal);
  const bar=document.getElementById('goal-bar');
  if(rate!==null){bar.style.width=Math.min(rate,100)+'%';bar.style.background=rate>=100?'#34d399':rate>=50?'#facc15':'#f87171';document.getElementById('goal-rate').textContent=rate+'% 達成';}
  else{bar.style.width='0%';document.getElementById('goal-rate').textContent='未設定';}
  renderGraphs(md);

  // Income page
  document.getElementById('inc-total').textContent='¥'+fmt(inc);
  document.getElementById('inc-sub').textContent=calInc>0?'うちカレンダー収入 ¥'+fmt(calInc):'';
  renderIncList(md);

  // Expense page
  document.getElementById('exp-total').textContent='¥'+fmt(exp);
  document.getElementById('exp-sub').textContent=calExp>0?'うちカレンダー支出 ¥'+fmt(calExp):'';
  renderExpList(md);

  // Calendar page
  document.getElementById('cal-inc-t').textContent='¥'+fmt(calInc);
  document.getElementById('cal-exp-t').textContent='¥'+fmt(calExp);
  renderCal(md);
}

// ── Graphs ────────────────────────────────────────────────────────────────
const GD=[
  {title:'固定費 / 変動費',fn:renderPie},
  {title:'月別支出推移',fn:renderBarExp},
  {title:'月別貯金率',fn:renderBarRate},
];
function gMonths(){return Array.from({length:6},(_,i)=>{const g=addM(cur.y,cur.m,i-5);return mk(g.y,g.m);});}
function renderGraphs(md){
  const dots=document.getElementById('graph-dots');dots.innerHTML='';
  GD.forEach((_,i)=>{const d=document.createElement('div');d.className='graph-dot'+(i===graphIdx?' active':'');d.style.width=(i===graphIdx?18:6)+'px';d.onclick=()=>{graphIdx=i;renderGraphs(curMonth());};dots.appendChild(d);});
  document.getElementById('graph-title').textContent=GD[graphIdx].title;
  const body=document.getElementById('graph-body');body.innerHTML='';
  GD[graphIdx].fn(body,md);
}
function renderPie(el,md){
  const fx=(md.expenses||[]).filter(e=>e.fixed).reduce((s,e)=>s+(Number(e.amount)||0),0);
  const vr=(md.expenses||[]).filter(e=>!e.fixed).reduce((s,e)=>s+(Number(e.amount)||0),0);
  const tot=fx+vr;
  if(!tot){el.innerHTML='<div style="text-align:center;color:#555;padding:28px 0;font-size:13px">データなし</div>';return;}
  const fp=Math.round(fx/tot*100),vp=100-fp,r=72,cx=90,cy=90;
  function pt(a){const rad=(a-90)*Math.PI/180;return{x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)};}
  function arc(s,e,col){if(e-s>=360)e=359.99;const p1=pt(s),p2=pt(e),lg=e-s>180?1:0;return`<path d="M${cx},${cy} L${p1.x},${p1.y} A${r},${r} 0 ${lg},1 ${p2.x},${p2.y} Z" fill="${col}"/>`;}
  el.innerHTML=`<div style="text-align:center"><svg width="180" height="180" viewBox="0 0 180 180" style="display:block;margin:0 auto">${arc(0,fp/100*360,'#f97316')}${arc(fp/100*360,360,'#60a5fa')}<circle cx="${cx}" cy="${cy}" r="44" fill="#1c1c1e"/><text x="${cx}" y="${cy-5}" text-anchor="middle" fill="#fff" font-size="14" font-weight="800">${fp}%</text><text x="${cx}" y="${cy+13}" text-anchor="middle" fill="#888" font-size="9">固定費</text></svg><div class="pie-legend"><div class="pie-item"><div class="pie-item-label" style="color:#f97316">● 固定費 ${fp}%</div><div class="pie-item-val" style="color:#f97316">¥${fmt(fx)}</div></div><div class="pie-item"><div class="pie-item-label" style="color:#60a5fa">● 変動費 ${vp}%</div><div class="pie-item-val" style="color:#60a5fa">¥${fmt(vr)}</div></div></div></div>`;
}
function renderBar(el,months,color,valFn,isRate){
  const vals=months.map(valFn),max=Math.max(...vals,1);
  el.innerHTML=`<div class="bar-wrap">${months.map((m,i)=>`<div class="bar-col"><div class="bar-val">${vals[i]>0?(isRate?vals[i]+'%':Math.round(vals[i]/1000)+'k'):''}</div><div class="bar" style="background:${color};height:${Math.round(vals[i]/max*88)}px;min-height:${vals[i]>0?3:0}px"></div></div>`).join('')}</div><div class="bar-labels">${months.map(m=>`<div class="bar-label">${m.slice(5)}月</div>`).join('')}</div>`;
}
function renderBarExp(el){renderBar(el,gMonths(),'#f97316',k=>{const md=allData[k];return md?totals(md).exp:0;});}
function renderBarRate(el){renderBar(el,gMonths(),'#34d399',k=>{const md=allData[k];if(!md)return 0;const{balance,goal}=totals(md);return goal>0?Math.max(0,Math.round(balance/goal*100)):0;},true);}

// ── Income List ───────────────────────────────────────────────────────────
function renderIncList(md){
  let html='';
  if((md.incomes||[]).length>0){
    html+='<div class="section-label">定期収入</div>';
    (md.incomes||[]).forEach(it=>{
      const av=it.amount!==''&&it.amount!=null?`<div class="row-amount" style="color:#60a5fa">¥${fmt(it.amount)}</div>`:`<div style="color:#555;font-size:13px">未入力</div>`;
      html+=`<div class="row"><div><div class="row-name">${esc(it.name)}</div>${av}</div><div class="row-actions"><button class="btn-edit" onclick="openIncModal('${it.id}')">編集</button><button class="btn-del" onclick="confirmDel('income','${it.id}')">✕</button></div></div>`;
    });
  }
  const calE=[];
  Object.entries(md.calItems||{}).sort((a,b)=>Number(a[0])-Number(b[0])).forEach(([day,items])=>items.filter(x=>x.type==='inc').forEach(it=>calE.push({...it,day:Number(day)})));
  if(calE.length>0){
    html+=`<div class="section-label" style="${(md.incomes||[]).length>0?'margin-top:20px':''}">カレンダー収入</div>`;
    calE.forEach(it=>{html+=`<div class="row"><div><div style="font-size:11px;color:#34d399;font-weight:600;margin-bottom:2px">${cur.m}月${it.day}日</div><div class="row-name">${esc(it.name||'（名称なし）')}</div>${it.memo?`<div class="row-memo">${esc(it.memo)}</div>`:''}<div class="row-amount" style="color:#60a5fa;margin-top:2px">¥${fmt(it.amount)}</div></div><div class="row-actions"><button class="btn-edit" onclick="openCalItemModal(${it.day},'${it.id}')">編集</button><button class="btn-del" onclick="delCalItem(${it.day},'${it.id}')">✕</button></div></div>`;});
  }
  if((md.incomes||[]).length===0&&calE.length===0)html='<div class="empty-msg">収入項目がありません</div>';
  document.getElementById('income-list').innerHTML=html;
}

// ── Expense List ──────────────────────────────────────────────────────────
function renderExpList(md){
  const fx=(md.expenses||[]).filter(e=>e.fixed),vr=(md.expenses||[]).filter(e=>!e.fixed);
  let html='';
  if(fx.length>0){html+='<div class="section-label">固定費</div>';fx.forEach(it=>{html+=expRowH(it);});}
  if(vr.length>0){html+=`<div class="section-label" ${fx.length>0?'style="margin-top:20px"':''}>変動費</div>`;vr.forEach(it=>{html+=expRowH(it);});}
  const calE=[];
  Object.entries(md.calItems||{}).sort((a,b)=>Number(a[0])-Number(b[0])).forEach(([day,items])=>items.filter(x=>x.type==='exp').forEach(it=>calE.push({...it,day:Number(day)})));
  if(calE.length>0){
    html+=`<div class="section-label" ${(md.expenses||[]).length>0?'style="margin-top:20px"':''}>カレンダー支出</div>`;
    calE.forEach(it=>{html+=`<div class="row"><div><div style="font-size:11px;color:#f97316;font-weight:600;margin-bottom:2px">${cur.m}月${it.day}日</div><div class="row-name">${esc(it.name||'（名称なし）')}</div>${it.memo?`<div class="row-memo">${esc(it.memo)}</div>`:''}<div class="row-amount" style="color:#f97316;margin-top:2px">¥${fmt(it.amount)}</div></div><div class="row-actions"><button class="btn-edit" onclick="openCalItemModal(${it.day},'${it.id}')">編集</button><button class="btn-del" onclick="delCalItem(${it.day},'${it.id}')">✕</button></div></div>`;});
  }
  if((md.expenses||[]).length===0&&calE.length===0)html='<div class="empty-msg">支出項目がありません</div>';
  document.getElementById('expense-list').innerHTML=html;
}
function expRowH(it){return`<div class="row${it.fixed?' fixed':''}"><div><div style="display:flex;align-items:center"><span class="row-name">${esc(it.name)}</span>${it.fixed?'<span class="badge-fixed">固定</span>':''}</div><div class="row-amount" style="color:#f97316">¥${fmt(it.amount)||'0'}</div></div><div class="row-actions"><button class="btn-edit" onclick="openExpModal('${it.id}')">編集</button><button class="btn-del" onclick="confirmDel('expense','${it.id}')">✕</button></div></div>`;}

// ── Calendar ──────────────────────────────────────────────────────────────
function renderCal(md){
  // Grid
  const el=document.getElementById('cal-grid-wrap');
  const days=daysIn(cur.y,cur.m),first=new Date(cur.y,cur.m-1,1).getDay(),td=today();
  const DOW=['日','月','火','水','木','金','土'];
  const cols=DOW.map((d,i)=>`<div class="cal-dow-cell" style="color:${i===0?'#f87171':i===6?'#60a5fa':'#666'}">${d}</div>`).join('');
  let cells='';
  for(let i=0;i<first;i++)cells+='<div></div>';
  for(let d=1;d<=days;d++){
    const items=(md.calItems||{})[String(d)]||[];
    const hasI=items.some(x=>x.type==='inc'),hasE=items.some(x=>x.type==='exp');
    const iT=items.filter(x=>x.type==='inc').reduce((s,t)=>s+(Number(t.amount)||0),0);
    const eT=items.filter(x=>x.type==='exp').reduce((s,t)=>s+(Number(t.amount)||0),0);
    const dow=(first+d-1)%7,isT=td.y===cur.y&&td.m===cur.m&&td.d===d;
    const dc=dow===0?'#f87171':dow===6?'#60a5fa':'#ccc';
    let dots='',amts='';
    if(hasI||hasE){dots=`<div class="cal-dots">${hasI?'<div class="cal-dot-i"></div>':''}${hasE?'<div class="cal-dot-e"></div>':''}</div>`;}
    if(hasI&&iT>0)amts+=`<div class="cal-amt" style="color:#34d399">${fmtMan(iT)}</div>`;
    if(hasE&&eT>0)amts+=`<div class="cal-amt" style="color:#f97316">${fmtMan(eT)}</div>`;
    cells+=`<div class="cal-cell${isT?' today':''}" onclick="openCalDay(${d})"><div class="cal-day" style="color:${dc};font-weight:${isT?700:400}">${d}</div>${dots}${amts}</div>`;
  }
  el.innerHTML=`<div class="cal-card"><div class="cal-dow">${cols}</div><div class="cal-grid">${cells}</div></div>`;

  // List
  const le=document.getElementById('cal-list');
  const entries=Object.entries(md.calItems||{}).sort((a,b)=>Number(a[0])-Number(b[0]));
  if(!entries.length){le.innerHTML='';return;}
  let lh='<div class="section-label">登録済み</div>';
  entries.forEach(([day,items])=>{
    const rows=items.map(it=>{
      const isI=it.type==='inc';
      return`<div class="cal-list-row"><div><div style="display:flex;align-items:center;gap:6px;margin-bottom:2px"><span class="type-badge" style="background:${isI?'rgba(96,165,250,.2)':'rgba(249,115,22,.2)'};color:${isI?'#60a5fa':'#f97316'}">${isI?'収入':'支出'}</span><span style="font-size:14px;color:#ddd">${esc(it.name||'（名称なし）')}</span></div>${it.memo?`<div style="font-size:11px;color:#888">${esc(it.memo)}</div>`:''}</div><div class="cal-list-actions"><span style="font-size:15px;font-weight:700;color:${isI?'#60a5fa':'#f97316'}">¥${fmt(it.amount)}</span><button class="btn-edit-sm" onclick="openCalItemModal(${day},'${it.id}')">編集</button><button class="btn-del-sm" onclick="delCalItem(${day},'${it.id}')">✕</button></div></div>`;
    }).join('');
    lh+=`<div class="cal-list-card"><div class="cal-list-date">${cur.m}月${day}日</div>${rows}</div>`;
  });
  le.innerHTML=lh;
}

// ── Modal helpers ─────────────────────────────────────────────────────────
function openModal(title,body){document.getElementById('modal-title').textContent=title;document.getElementById('modal-body').innerHTML=body;document.getElementById('modal').style.display='flex';}
function closeModal(){document.getElementById('modal').style.display='none';}

// ── Income Modal ──────────────────────────────────────────────────────────
function openIncModal(id){
  const md=curMonth(),it=id?(md.incomes||[]).find(i=>i.id===id):null;
  openModal(id?'収入を編集':'収入を追加',`<div class="field"><label>項目名</label><input id="f-name" type="text" value="${esc(it?.name||'')}" placeholder="例：給与" autocomplete="off"></div><div class="field"><label>金額（円）</label><input id="f-amount" type="number" inputmode="numeric" value="${it?.amount||''}" placeholder="0" autocomplete="off"></div><button class="btn-primary" style="background:#60a5fa" onclick="saveInc('${id||''}')"> ${id?'保存':'追加'}</button>`);
}
function saveInc(id){
  const name=document.getElementById('f-name').value.trim(),amount=document.getElementById('f-amount').value;
  if(!name)return;const md=curMonth();
  if(id)md.incomes=(md.incomes||[]).map(i=>i.id===id?{...i,name,amount}:i);
  else md.incomes=[...(md.incomes||[]),{id:uid(),name,amount}];
  saveMonth(md);closeModal();render();
}

// ── Expense Modal ─────────────────────────────────────────────────────────
function openExpModal(id){
  const md=curMonth(),it=id?(md.expenses||[]).find(e=>e.id===id):null,fx=it?.fixed||false;
  openModal(id?'支出を編集':'支出を追加',`<div class="field"><label>項目名</label><input id="f-name" type="text" value="${esc(it?.name||'')}" placeholder="例：家賃、食費" autocomplete="off"></div><div class="field"><label>金額（円）</label><input id="f-amount" type="number" inputmode="numeric" value="${it?.amount||''}" placeholder="0" autocomplete="off"></div><div class="toggle-wrap" onclick="toggleFixed()"><div class="toggle-track${fx?' on':''}" id="toggle-track"><div class="toggle-thumb"></div></div><span class="toggle-label">固定費にする（来月も引き継ぐ）</span></div><button class="btn-primary" style="background:#f97316" onclick="saveExp('${id||''}')"> ${id?'保存':'追加'}</button>`);
}
function toggleFixed(){document.getElementById('toggle-track').classList.toggle('on');}
function saveExp(id){
  const name=document.getElementById('f-name').value.trim(),amount=document.getElementById('f-amount').value,fixed=document.getElementById('toggle-track').classList.contains('on');
  if(!name)return;const md=curMonth();
  if(id)md.expenses=(md.expenses||[]).map(e=>e.id===id?{...e,name,amount,fixed}:e);
  else md.expenses=[...(md.expenses||[]),{id:uid(),name,amount,fixed}];
  saveMonth(md);closeModal();render();
}

// ── Goal Modal ────────────────────────────────────────────────────────────
function openGoalModal(){
  const md=curMonth();
  openModal('貯金目標を設定',`<div class="field"><label>目標金額（円）</label><input id="f-goal" type="number" inputmode="numeric" value="${md.savingGoal||''}" placeholder="30000" autocomplete="off"></div><button class="btn-primary" style="background:#34d399" onclick="saveGoal()">OK</button>`);
}
function saveGoal(){const md=curMonth();md.savingGoal=Number(document.getElementById('f-goal').value)||0;saveMonth(md);closeModal();render();}

// ── Calendar Day Modal ────────────────────────────────────────────────────
function openCalDay(day){
  const md=curMonth(),items=(md.calItems||{})[String(day)]||[];
  let iH=items.map(it=>{
    const isI=it.type==='inc';
    return`<div class="day-item"><div><div style="display:flex;align-items:center;gap:6px;margin-bottom:2px"><span class="type-badge" style="background:${isI?'rgba(96,165,250,.2)':'rgba(249,115,22,.2)'};color:${isI?'#60a5fa':'#f97316'}">${isI?'収入':'支出'}</span><span style="font-size:14px;color:#ddd">${esc(it.name||'（名称なし）')}</span></div>${it.memo?`<div style="font-size:11px;color:#888">${esc(it.memo)}</div>`:''}<div style="font-size:16px;font-weight:700;color:${isI?'#60a5fa':'#f97316'};margin-top:2px">¥${fmt(it.amount)}</div></div><button style="background:#3a3a3c;border:none;color:#aaa;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:inherit" onclick="closeModal();openCalItemModal(${day},'${it.id}')">編集</button></div>`;
  }).join('');
  openModal(`${cur.m}月${day}日`,`${iH}<button class="btn-primary" style="background:#34d399;margin-top:${items.length?8:0}px" onclick="closeModal();openCalItemModal(${day},null)">＋ この日に追加</button>`);
}

// ── Calendar Item Modal ───────────────────────────────────────────────────
function selCalType(t){
  calItemType=t;
  document.getElementById('tb-inc').className='type-btn'+(t==='inc'?' sel-inc':'');
  document.getElementById('tb-exp').className='type-btn'+(t==='exp'?' sel-exp':'');
}
function openCalItemModal(day,id){
  const md=curMonth(),it=id?((md.calItems||{})[String(day)]||[]).find(x=>x.id===id):null;
  calItemType=it?.type||'inc';
  const ii=calItemType==='inc'?' sel-inc':'',ei=calItemType==='exp'?' sel-exp':'';
  openModal(it?`${cur.m}月${day}日 − 編集`:`${cur.m}月${day}日 − 追加`,`
    <div class="type-selector">
      <button class="type-btn${ii}" id="tb-inc" onclick="selCalType('inc')">↑ 収入</button>
      <button class="type-btn${ei}" id="tb-exp" onclick="selCalType('exp')">↓ 支出</button>
    </div>
    <div class="field"><label>項目名</label><input id="f-name" type="text" value="${esc(it?.name||'')}" placeholder="例：フリマ売上、外食" autocomplete="off"></div>
    <div class="field"><label>金額（円）</label><input id="f-amount" type="number" inputmode="numeric" value="${it?.amount!=null?it.amount:''}" placeholder="0" autocomplete="off"></div>
    <div class="field"><label>メモ（任意）</label><input id="f-memo" type="text" value="${esc(it?.memo||'')}" placeholder="例：メルカリ、ランチ代" autocomplete="off"></div>
    <button class="btn-primary" style="background:#34d399" onclick="saveCalItem(${day},'${id||''}')"> ${it?'保存':'登録'}</button>`);
}
function saveCalItem(day,id){
  const name=document.getElementById('f-name').value,amount=document.getElementById('f-amount').value,memo=document.getElementById('f-memo').value;
  if(!amount)return;
  const md=curMonth();if(!md.calItems)md.calItems={};
  const k=String(day),ni={name,amount:Number(amount),memo,type:calItemType};
  if(id)md.calItems[k]=(md.calItems[k]||[]).map(x=>x.id===id?{...x,...ni}:x);
  else md.calItems[k]=[...(md.calItems[k]||[]),{id:uid(),...ni}];
  saveMonth(md);closeModal();render();
}
function delCalItem(day,id){
  const md=curMonth(),k=String(day);
  md.calItems[k]=(md.calItems[k]||[]).filter(x=>x.id!==id);
  if(!md.calItems[k].length)delete md.calItems[k];
  saveMonth(md);render();
}

// ── Delete Confirm ────────────────────────────────────────────────────────
function confirmDel(type,id){pendingDelete={type,id};document.getElementById('confirm').style.display='flex';}
function closeConfirm(){pendingDelete=null;document.getElementById('confirm').style.display='none';}
document.getElementById('confirm-ok').onclick=function(){
  if(!pendingDelete)return;
  const md=curMonth();
  if(pendingDelete.type==='income')md.incomes=(md.incomes||[]).filter(i=>i.id!==pendingDelete.id);
  else md.expenses=(md.expenses||[]).filter(e=>e.id!==pendingDelete.id);
  saveMonth(md);closeConfirm();render();
};

// ── Tabs / Nav ────────────────────────────────────────────────────────────
document.querySelectorAll('nav button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page-'+btn.dataset.tab).classList.add('active');
  });
});
document.getElementById('btn-prev').onclick=()=>{cur=addM(cur.y,cur.m,-1);render();};
document.getElementById('btn-next').onclick=()=>{cur=addM(cur.y,cur.m,1);render();};
document.getElementById('btn-add-income').onclick=()=>openIncModal(null);
document.getElementById('btn-add-expense').onclick=()=>openExpModal(null);
document.getElementById('btn-goal-change').onclick=openGoalModal;
document.getElementById('graph-body').addEventListener('touchstart',e=>{graphTouchX=e.touches[0].clientX;},{passive:true});
document.getElementById('graph-body').addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-graphTouchX;if(Math.abs(dx)>40){graphIdx=(graphIdx+(dx<0?1:-1)+GD.length)%GD.length;renderGraphs(curMonth());}});

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

render();
</script>
